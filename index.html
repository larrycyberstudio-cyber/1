<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Heart-Popping Game</title>\n    <style>\n        body { font-family: Arial, sans-serif; text-align: center; }\n        #game { margin: 20px auto; }\n        .hidden { display: none; }\n    </style>\n</head>\n<body>\n    <h1>Heart-Popping Game</h1>\n    <div id="game">\n        <h2 id="score-display">Score: 0</h2>\n        <h2 id="high-score-display">High Score: 0</h2>\n        <canvas id="gameCanvas" width="400" height="400"></canvas>\n        <button id="start-btn">Start Game</button>\n    </div>\n    <script>\n        let score = 0;\n        let highScore = 0;\n        let difficulty = 1000; // Initial difficulty level\n        let combo = 0;\n        let comboThreshold = 5;\n        let powerUpActive = false;\n        let comboMessage = '';\n        let canvas = document.getElementById('gameCanvas');\n        let ctx = canvas.getContext('2d');\n        let heart;\n        let heartImage = new Image();\n        heartImage.src = 'heart.png'; // Add heart image\n        let powerUpImage = new Image();\n        powerUpImage.src = 'powerup.png'; // Add power-up image\n        let timer;\n        let powerUpTimer;\n        let gameActive = false;\n\n        const startGame = () => {\n            score = 0;\n            difficulty = 1000;\n            combo = 0;\n            comboMessage = '';\n            gameActive = true;\n            document.getElementById('start-btn').classList.add('hidden');\n            document.getElementById('score-display').innerText = 'Score: ' + score;\n            spawnHeart();\n        };\n\n        const spawnHeart = () => {\n            ctx.clearRect(0, 0, canvas.width, canvas.height);\n            let x = Math.random() * (canvas.width - 40);\n            let y = Math.random() * (canvas.height - 40);\n            ctx.drawImage(heartImage, x, y, 40, 40);\n            startTimer();\n        };\n\n        const startTimer = () => {\n            clearTimeout(timer);\n            timer = setTimeout(() => {\n                if (gameActive) {\n                    alert('Time is up! Your Score: ' + score);\n                    if (score > highScore) {\n                        highScore = score;\n                    }\n                    gameActive = false;\n                    document.getElementById('high-score-display').innerText = 'High Score: ' + highScore;\n                    document.getElementById('start-btn').classList.remove('hidden');\n                }\n            }, difficulty);\n        };\n\n        const checkClick = (event) => {\n            if (!gameActive) return;\n            // Check if heart is clicked\n            // Increment score and handle combo/power-ups\n            score++;\n            combo++;\n            if (combo >= comboThreshold) {\n                comboMessage = 'Combo!';\n                score += 5;\n                combo = 0;\n                // Activate power-up\n                powerUpActive = true;\n                spawnPowerUp();\n            }\n            document.getElementById('score-display').innerText = 'Score: ' + score;\n            spawnHeart();\n        };\n\n        const spawnPowerUp = () => {\n            ctx.drawImage(powerUpImage, Math.random() * (canvas.width - 40), Math.random() * (canvas.height - 40), 40, 40);\n            powerUpTimer = setTimeout(() => {\n                powerUpActive = false;\n            }, 5000); // Power-up lasts for 5 seconds\n        };\n\n        canvas.addEventListener('click', checkClick);\n        document.getElementById('start-btn').addEventListener('click', startGame);\n    </script>\n</body>\n</html>\n
